<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curly Girl Sweets Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --hot-pink: #ff007f;
            --soft-pink: #ff85c1;
            --glitter-white: #fffafa;
            --dark-pink: #222; /* Matching the black in your logo */
        }

        body {
            background: linear-gradient(135deg, #fce4ec, #f8bbd0, #f48fb1);
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .calculator-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            width: 360px;
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 3px solid var(--soft-pink);
            text-align: center;
            position: relative;
        }

        /* Logo Styling */
        .logo {
            width: 180px;
            height: auto;
            margin-bottom: 10px;
        }

        h1 {
            font-family: 'Pacifico', cursive;
            color: var(--dark-pink);
            margin: 0 0 20px 0;
            font-size: 1.5rem;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #555;
            margin-left: 15px;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 25px;
            border: 2px solid #eee;
            box-sizing: border-box;
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--soft-pink);
            box-shadow: 0 0 10px rgba(255, 133, 193, 0.3);
        }

        /* Updated Sweet Price Button */
        .calc-btn {
            width: 100%;
            padding: 16px;
            border-radius: 50px;
            border: none;
            background: #000; /* Matching logo black */
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .calc-btn:hover {
            background: var(--hot-pink);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 0, 127, 0.3);
        }

        .result-display {
            margin-top: 25px;
            padding: 20px;
            background: #fff;
            border-radius: 25px;
            border: 2px solid var(--soft-pink);
        }

        .result-label {
            font-size: 0.9rem;
            color: #777;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .price {
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--hot-pink);
            margin: 5px 0;
        }

        .sparkle {
            position: absolute;
            font-size: 1.2rem;
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="calculator-card">
        <span class="sparkle" style="top: 20px; right: 30px;">✨</span>
        
        <img src="IMG_2802.jpeg" alt="Curly Girl Sweets Logo" class="logo">
        
        <h1>Pricing Magic</h1>

        <div class="input-group">
            <label>Ingredients Cost ($)</label>
            <input type="number" id="cost" value="15">
        </div>

        <div class="input-group">
            <label>Hours Spent</label>
            <input type="number" id="hours" value="3">
        </div>

        <div class="input-group">
            <label>Your Hourly Rate ($)</label>
            <input type="number" id="rate" value="25">
        </div>

        <button class="calc-btn" onclick="calculatePrice()">
            Get Sweet Price 🍰
        </button>

        <div class="result-display">
            <div class="result-label">The Total:</div>
            <div class="price" id="totalPrice">$0.00</div>
        </div>
    </div>

    <script>
        function calculatePrice() {
            const cost = parseFloat(document.getElementById('cost').value) || 0;
            const hours = parseFloat(document.getElementById('hours').value) || 0;
            const rate = parseFloat(document.getElementById('rate').value) || 0;

            // Industry Standard: (COGS * 3) + Labor
            const total = (cost * 3) + (hours * rate);

            document.getElementById('totalPrice').innerText = '$' + total.toFixed(2);
        }

        // Initialize calculation
        window.onload = calculatePrice;
    </script>
</body>
</html>
